<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Knowledge Base - Ciel Mobility AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-violet: #bd00ff;
            --bg-dark: #050a14;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(189, 0, 255, 0.05) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 25%);
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            padding: 50px 40px;
            background: rgba(5, 10, 20, 0.6);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 243, 255, 0.05);
            max-width: 500px;
            width: 90%;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--neon-cyan);
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        .subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            color: #8892b0;
            margin-bottom: 40px;
            text-align: center;
        }

        .upload-area {
            width: 100%;
            border: 2px dashed rgba(189, 0, 255, 0.4);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: rgba(189, 0, 255, 0.05);
            margin-bottom: 30px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--neon-violet);
            background: rgba(189, 0, 255, 0.1);
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.2);
        }

        .upload-area svg {
            width: 48px;
            height: 48px;
            stroke: var(--neon-violet);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-bottom: 15px;
        }

        .upload-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            color: #e0e0e0;
        }

        .file-name {
            display: none;
            margin-top: 15px;
            font-size: 14px;
            color: var(--neon-cyan);
            font-family: 'Inter', sans-serif;
        }

        #fileInput {
            display: none;
        }

        .add-btn {
            display: block;
            width: 100%;
            padding: 16px 24px;
            background: var(--neon-violet);
            border: none;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .add-btn:hover:not(:disabled) {
            background: #d400ff;
            box-shadow: 0 0 20px rgba(189, 0, 255, 0.5);
            transform: translateY(-2px);
        }

        .add-btn:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .back-link {
            margin-top: 20px;
            color: #8892b0;
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--neon-cyan);
        }

        #statusMessage {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            height: 20px;
        }
        .status-success { color: #00f3ff; }
        .status-error { color: #ff2a6d; }
        .form-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="form-container">
        <div class="title">Prompt Creation</div>
        <iframe 
            src="/form/d4dc2007-3c6d-4a26-b1f0-b5fbe6c8319c" 
            allowfullscreen style="height: 100%">
        </iframe>
        
        <div id="statusMessage"></div>
        
        <a href="admin.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        // Matrix Background
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const cols = Math.floor(width / 20) + 1;
        const ypos = Array(cols).fill(0);

        function matrix() {
            ctx.fillStyle = 'rgba(5, 10, 20, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#bd00ff';
            ctx.font = '15px monospace';
            ypos.forEach((y, ind) => {
                const text = String.fromCharCode(Math.random() * 128);
                const x = ind * 20;
                ctx.fillText(text, x, y);
                if (y > 100 + Math.random() * 10000) ypos[ind] = 0;
                else ypos[ind] = y + 20;
            });
        }
        setInterval(matrix, 50);
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });

        // Logic
        let sessionId = sessionStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
            sessionStorage.setItem('sessionId', sessionId);
        }

        const fileInput = document.getElementById('fileInput');
        const addBtn = document.getElementById('addBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const statusMessage = document.getElementById('statusMessage');

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileNameDisplay.textContent = fileInput.files[0].name;
                fileNameDisplay.style.display = 'block';
                addBtn.disabled = false;
                statusMessage.textContent = '';
            } else {
                fileNameDisplay.style.display = 'none';
                addBtn.disabled = true;
            }
        });

        addBtn.addEventListener('click', async () => {
            if (!fileInput.files.length) return;
            
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            addBtn.disabled = true;
            addBtn.textContent = 'UPLOADING...';
            statusMessage.textContent = '';
            statusMessage.className = '';

            try {
                const response = await fetch(`http://localhost:5678/webhook/cunsult-rag?sessionId=${sessionId}`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    statusMessage.textContent = 'Successfully added to knowledge base!';
                    statusMessage.className = 'status-success';
                    fileInput.value = '';
                    fileNameDisplay.style.display = 'none';
                    setTimeout(() => { addBtn.disabled = true; addBtn.textContent = 'ADD TO KNOWLEDGE BASE'; }, 2000);
                } else {
                    throw new Error(`Server returned ${response.status}`);
                }
            } catch (err) {
                console.error(err);
                statusMessage.textContent = `Error: ${err.message}`;
                statusMessage.className = 'status-error';
                addBtn.disabled = false;
                addBtn.textContent = 'ADD TO KNOWLEDGE BASE';
            }
        });
    </script>
</body>
</html>
