<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightRAG Test Chat - Ciel Mobility AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-violet: #bd00ff;
            --bg-dark: #050a14;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(189, 0, 255, 0.05) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 25%);
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            height: 95vh;
            width: 95%;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(5, 10, 20, 0.6);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 243, 255, 0.05);
            padding: 20px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            padding-bottom: 10px;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        iframe {
            flex-grow: 1;
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 8px;
            background: #fff;
        }

        .back-link {
            color: #8892b0;
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 600;
            transition: color 0.2s, text-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-link:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="form-container">
        <div class="header-section">
            <div class="title">LightRAG Test Chat</div>
            <a href="admin.html" class="back-link">← Back to Admin</a>
        </div>
        <iframe 
            src="http://localhost:5678/webhook/d8dd89fe-3df6-4e48-95a8-1c08fb64c645/chat" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // Matrix Background
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const cols = Math.floor(width / 20) + 1;
        const ypos = Array(cols).fill(0);

        function matrix() {
            ctx.fillStyle = 'rgba(5, 10, 20, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#00f3ff'; // Match cyan neon style
            ctx.font = '15px monospace';
            ypos.forEach((y, ind) => {
                const text = String.fromCharCode(Math.random() * 128);
                const x = ind * 20;
                ctx.fillText(text, x, y);
                if (y > 100 + Math.random() * 10000) ypos[ind] = 0;
                else ypos[ind] = y + 20;
            });
        }
        setInterval(matrix, 50);
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });
    </script>
</body>
</html>
