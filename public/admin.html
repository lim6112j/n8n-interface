<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciel Mobility AI Agent - Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;500;600;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-violet: #bd00ff;
            --bg-dark: #050a14;
            --danger: #ff2a6d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(189, 0, 255, 0.05) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 25%);
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            padding: 50px 40px;
            background: rgba(5, 10, 20, 0.6);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 243, 255, 0.05);
            max-width: 500px;
            width: 90%;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--neon-cyan);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            text-align: center;
        }

        .logo::before {
            content: '';
            display: block;
            width: 12px;
            height: 12px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 16px 24px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: #fff;
            text-decoration: none;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.2), transparent);
            transition: all 0.4s ease;
        }

        .nav-btn:hover {
            background: rgba(0, 243, 255, 0.15);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
            color: var(--neon-cyan);
        }

        .nav-btn:hover::before {
            left: 100%;
        }

        .nav-btn.secondary {
            border-color: rgba(189, 0, 255, 0.3);
            background: rgba(189, 0, 255, 0.05);
        }

        .nav-btn.secondary:hover {
            background: rgba(189, 0, 255, 0.15);
            border-color: var(--neon-violet);
            box-shadow: 0 0 20px rgba(189, 0, 255, 0.2);
            color: #fff;
        }

        .nav-btn.secondary::before {
            background: linear-gradient(90deg, transparent, rgba(189, 0, 255, 0.2), transparent);
        }
    </style>
</head>

<body>

    <canvas id="matrix-bg"></canvas>

    <div class="container">
        <div class="logo">Ciel Mobility AI - Admin</div>

        <div class="button-group">
            <a href="knowledge_base.html" class="nav-btn">지식베이스 추가(RAG)</a>
            <a href="database_add.html" class="nav-btn secondary">데이터베이스 추가(POSTGRES)</a>
            <a href="index.html" class="nav-btn secondary" style="margin-top: 20px;">뒤로 가기 (Back)</a>
        </div>
        
        <div id="user-management-section" style="display: none; width: 100%; margin-top: 40px; border-top: 1px solid rgba(0, 243, 255, 0.2); padding-top: 20px;">
            <h3 style="color: var(--neon-cyan); margin-bottom: 15px; text-align: center;">User Management</h3>
            <div id="user-list" style="max-height: 300px; overflow-y: auto; width: 100%;">
                <div style="text-align: center; color: #aaa;">Loading users...</div>
            </div>
        </div>
    </div>

    <script>
        // Matrix Background Script
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const cols = Math.floor(width / 20) + 1;
        const ypos = Array(cols).fill(0);

        function matrix() {
            ctx.fillStyle = 'rgba(5, 10, 20, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#0f0';
            ctx.font = '15px monospace';
            ypos.forEach((y, ind) => {
                const text = String.fromCharCode(Math.random() * 128);
                const x = ind * 20;
                ctx.fillText(text, x, y);
                if (y > 100 + Math.random() * 10000) ypos[ind] = 0;
                else ypos[ind] = y + 20;
            });
        }
        setInterval(matrix, 50);
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });

        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                if (res.ok) {
                    const data = await res.json();
                    const userList = document.getElementById('user-list');
                    let html = '<table style="width: 100%; border-collapse: collapse; font-size: 0.9em;">';
                    html += `
                        <tr>
                            <th style="text-align: left; padding: 8px; border-bottom: 1px solid #444;">Name</th>
                            <th style="text-align: left; padding: 8px; border-bottom: 1px solid #444;">Email</th>
                            <th style="text-align: left; padding: 8px; border-bottom: 1px solid #444;">Role</th>
                            <th style="text-align: left; padding: 8px; border-bottom: 1px solid #444;">Action</th>
                        </tr>
                    `;
                    data.users.forEach(u => {
                        html += `
                            <tr>
                                <td style="padding: 8px; border-bottom: 1px solid #333;">${u.name || 'Unknown'}</td>
                                <td style="padding: 8px; border-bottom: 1px solid #333; max-width: 150px; overflow: hidden; text-overflow: ellipsis;" title="${u.email}">${u.email}</td>
                                <td style="padding: 8px; border-bottom: 1px solid #333;">
                                    <select id="role-${u.id}" style="background: #111; color: #fff; border: 1px solid #444; padding: 4px; border-radius: 4px; width: 100%;">
                                        <option value="user" ${u.role === 'user' ? 'selected' : ''}>User</option>
                                        <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                                        <option value="superuser" ${u.role === 'superuser' ? 'selected' : ''}>Superuser</option>
                                    </select>
                                </td>
                                <td style="padding: 8px; border-bottom: 1px solid #333;">
                                    <button onclick="updateRole(${u.id})" style="background: rgba(0,243,255,0.1); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); padding: 4px 8px; border-radius: 4px; cursor: pointer; width: 100%;">Save</button>
                                </td>
                            </tr>
                        `;
                    });
                    html += '</table>';
                    userList.innerHTML = html;
                }
            } catch (err) {
                console.error('Failed to load users:', err);
            }
        }

        async function updateRole(userId) {
            const role = document.getElementById(`role-${userId}`).value;
            try {
                const res = await fetch(`/api/users/${userId}/role`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role })
                });
                if (res.ok) {
                    alert('Role updated successfully');
                } else {
                    alert('Failed to update role');
                }
            } catch (err) {
                console.error(err);
                alert('Error updating role');
            }
        }

        async function initAdmin() {
            try {
                const res = await fetch('/api/current-user');
                const data = await res.json();
                if (data.authenticated && data.user.role === 'superuser') {
                    document.getElementById('user-management-section').style.display = 'block';
                    // Allow container to expand
                    document.querySelector('.container').style.maxWidth = '700px';
                    loadUsers();
                }
            } catch (err) {
                console.error('Auth error', err);
            }
        }

        initAdmin();
    </script>
</body>

</html>
