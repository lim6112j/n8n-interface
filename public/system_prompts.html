<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 프롬프트 관리 - Ciel Mobility AI</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-violet: #bd00ff;
            --bg-dark: #050a14;
            --danger: #ff2a6d;
            --success: #05ffc5;
            --border-glow: rgba(0, 243, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(189, 0, 255, 0.05) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 25%);
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.12;
            pointer-events: none;
        }

        .app-container {
            display: flex;
            width: 96vw;
            height: 90vh;
            background: rgba(5, 10, 20, 0.85);
            border: 1px solid rgba(0, 243, 255, 0.25);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), inset 0 0 30px rgba(0, 243, 255, 0.05);
            overflow: hidden;
            z-index: 10;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 290px;
            border-right: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            flex-direction: column;
            background: rgba(0, 243, 255, 0.01);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 24px 20px;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            border-bottom: 1px solid rgba(0, 243, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .sidebar-header .back-link {
            color: #8892b0;
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 600;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .sidebar-header .back-link:hover {
            color: var(--neon-cyan);
        }

        .search-container {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 6px;
            padding: 10px 14px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .add-prompt-btn-container {
            padding: 15px 20px;
        }

        .btn-add-new {
            width: 100%;
            padding: 12px;
            background: rgba(189, 0, 255, 0.1);
            border: 1px solid rgba(189, 0, 255, 0.4);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(189, 0, 255, 0.1);
        }

        .btn-add-new:hover {
            background: rgba(189, 0, 255, 0.25);
            border-color: var(--neon-violet);
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.4);
            transform: translateY(-1px);
        }

        /* Second sidebar style (Nodes) */
        .nodes-sidebar {
            width: 250px;
            background: rgba(0, 243, 255, 0.005);
            transition: width 0.3s ease, border-right-color 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0, 243, 255, 0.2);
        }

        .nodes-sidebar.collapsed {
            width: 0px !important;
            border-right-color: transparent !important;
            pointer-events: none;
        }

        .btn-add-new-node {
            width: 100%;
            padding: 10px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.4);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .btn-add-new-node:hover {
            background: rgba(0, 243, 255, 0.2);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            transform: translateY(-1px);
        }

        .prompts-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        .prompt-item {
            padding: 18px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s;
            position: relative;
        }

        .prompt-item:hover {
            background: rgba(0, 243, 255, 0.03);
        }

        .prompt-item.active {
            background: rgba(0, 243, 255, 0.08);
            border-left: 3px solid var(--neon-cyan);
        }

        .prompt-item-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .prompt-item.active .prompt-item-name {
            color: var(--neon-cyan);
        }

        .prompt-item-meta {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: #8892b0;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        /* Main Workspace Styling */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.15);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8892b0;
            font-family: 'Rajdhani', sans-serif;
            text-align: center;
            gap: 15px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            stroke: rgba(0, 243, 255, 0.2);
            fill: none;
            stroke-width: 1.5;
        }

        .empty-state h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            color: rgba(255, 255, 255, 0.7);
        }

        .editor-workspace {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 24px;
            overflow: hidden;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .editor-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            font-size: 20px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .editor-title span {
            font-size: 14px;
            font-family: 'Rajdhani', sans-serif;
            color: #8892b0;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 9px 18px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            outline: none;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.5px;
        }

        .btn-save {
            background: var(--neon-cyan);
            color: #050a14;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .btn-save:hover {
            background: #00d4e4;
            box-shadow: 0 0 18px rgba(0, 243, 255, 0.4);
            transform: translateY(-1px);
        }

        .btn-delete {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-delete:hover {
            background: rgba(255, 42, 109, 0.1);
            box-shadow: 0 0 12px rgba(255, 42, 109, 0.2);
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid #444;
            color: #ccc;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #666;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: #8892b0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 10px 14px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.15);
        }

        .prompt-editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
        }

        .prompt-editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(0, 243, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .prompt-editor-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: var(--neon-cyan);
            letter-spacing: 0.5px;
        }

        .editor-utils {
            display: flex;
            gap: 10px;
        }

        .util-btn {
            background: transparent;
            border: none;
            color: #8892b0;
            cursor: pointer;
            padding: 4px 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .util-btn:hover {
            color: var(--neon-cyan);
        }

        .prompt-textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #39ff14; /* Matrix Green prompt text */
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 16px;
            resize: none;
            outline: none;
            overflow-y: auto;
        }

        /* Notifications style */
        #statusMessage {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            display: none;
            z-index: 1000;
            background: rgba(5, 10, 20, 0.95);
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            transform: translateY(10px);
            transition: all 0.3s;
        }

        .status-success {
            color: var(--success);
            border: 1px solid var(--success);
            box-shadow: 0 0 15px rgba(5, 255, 197, 0.15) !important;
        }

        .status-error {
            color: var(--danger);
            border: 1px solid var(--danger);
            box-shadow: 0 0 15px rgba(255, 42, 109, 0.15) !important;
        }
    </style>
</head>

<body>
    <canvas id="matrix-bg"></canvas>

    <div class="app-container">
        <!-- First Sidebar: Workflows -->
        <div class="sidebar" id="workflowsSidebar">
            <div class="sidebar-header">
                <div>WORKFLOWS</div>
                <a href="admin.html" class="back-link">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Admin
                </a>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="워크플로우 검색..." oninput="filterWorkflows()">
            </div>

            <div class="add-prompt-btn-container">
                <button class="btn-add-new" onclick="startNewWorkflowPrompt()">+ 새 워크플로우 추가</button>
            </div>

            <ul class="prompts-list" id="workflowsList">
                <!-- Javascript will load workflows list items here -->
            </ul>
        </div>

        <!-- Second Sidebar: Nodes (Dynamically slides in when workflow selected) -->
        <div class="nodes-sidebar collapsed" id="nodesSidebar">
            <div class="sidebar-header" style="padding: 16px 20px; font-size: 14px; border-bottom: 1px dashed rgba(0, 243, 255, 0.15);">
                <div id="selectedWorkflowViewTitle" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--neon-cyan);">NODES</div>
            </div>

            <div class="add-prompt-btn-container" style="padding: 12px 20px;">
                <button class="btn-add-new-node" onclick="startNewNodePrompt()">+ 새 노드 추가</button>
            </div>

            <ul class="prompts-list" id="nodesList">
                <!-- Javascript will load nodes here -->
            </ul>
        </div>

        <!-- Main Workspace -->
        <div class="main-content" id="mainContent">
            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <h3>워크플로우 및 노드를 선택하십시오</h3>
                <p style="color: #6c7a9c; font-size: 14px;">좌측의 워크플로우 그룹을 클릭하고 노드를 선택해 편집하십시오.</p>
            </div>

            <!-- Editor Workspace -->
            <div id="editorWorkspace" class="editor-workspace">
                <div class="editor-header">
                    <div class="editor-title" id="editorTitle">
                        프롬프트 세부사항
                        <span id="promptIdDisplay">ID: NEW</span>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-cancel" onclick="cancelEditing()">취소</button>
                        <button class="btn btn-delete" id="deleteBtn" onclick="deletePrompt()">삭제</button>
                        <button class="btn btn-save" onclick="savePrompt()">저장</button>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="workflowName">워크플로우 실제 이름 *</label>
                        <input type="text" id="workflowName" class="form-control" placeholder="예: logistics_analysis">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="workflowViewName">화면 표시명 (View Name)</label>
                        <input type="text" id="workflowViewName" class="form-control" placeholder="예: 물류분석">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="workflowId">워크플로우 ID</label>
                        <input type="text" id="workflowId" class="form-control" placeholder="예: dsAmcpSQZgFTJClC">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="nodeName">노드 이름</label>
                        <input type="text" id="nodeName" class="form-control" placeholder="예: Generate Analysis Code">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label class="form-label" for="changes">변경 사항 (Changes)</label>
                        <input type="text" id="changes" class="form-control" placeholder="예: v1.0.1 - 차량번호 감지 정규식 수정">
                    </div>
                </div>

                <div class="prompt-editor-container">
                    <div class="prompt-editor-header">
                        <div class="prompt-editor-title">SYSTEM PROMPT CODE</div>
                        <div class="editor-utils">
                            <button class="util-btn" onclick="copyPrompt()">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                                클립보드 복사
                            </button>
                        </div>
                    </div>
                    <textarea id="promptText" class="prompt-textarea" placeholder="여기에 프롬프트 내용을 작성하세요..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <div id="statusMessage"></div>

    <script>
        // Matrix Background
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const cols = Math.floor(width / 20) + 1;
        const ypos = Array(cols).fill(0);

        function matrix() {
            ctx.fillStyle = 'rgba(5, 10, 20, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#00f3ff';
            ctx.font = '15px monospace';
            ypos.forEach((y, ind) => {
                const text = String.fromCharCode(Math.random() * 128);
                const x = ind * 20;
                ctx.fillText(text, x, y);
                if (y > 100 + Math.random() * 10000) ypos[ind] = 0;
                else ypos[ind] = y + 20;
            });
        }
        setInterval(matrix, 50);
        window.addEventListener('resize', () => { 
            width = canvas.width = window.innerWidth; 
            height = canvas.height = window.innerHeight; 
        });

        // App Logic
        let allPrompts = [];
        let uniqueWorkflows = [];
        let activeWorkflow = null;
        let selectedPrompt = null;
        let isCreatingNew = false;

        function showStatus(msg, isError = false) {
            const el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = isError ? 'status-error' : 'status-success';
            el.style.display = 'block';
            el.style.transform = 'translateY(0)';
            setTimeout(() => {
                el.style.transform = 'translateY(10px)';
                setTimeout(() => el.style.display = 'none', 300);
            }, 3000);
        }

        async function verifyAuth() {
            try {
                const res = await fetch('/api/current-user');
                const data = await res.json();
                if (!data.authenticated || (data.user.role !== 'admin' && data.user.role !== 'superuser')) {
                    window.location.href = '/';
                }
            } catch (err) {
                console.error('인증 실패', err);
                window.location.href = '/';
            }
        }

        async function loadPrompts() {
            try {
                const res = await fetch('/api/system-prompts');
                if (res.ok) {
                    const data = await res.json();
                    allPrompts = data.prompts;
                    groupWorkflows();
                    renderWorkflowsList();
                    if (activeWorkflow) {
                        // Re-evaluate active workflow in new list
                        const updatedW = uniqueWorkflows.find(w => 
                            w.workflow_id === activeWorkflow.workflow_id && 
                            w.workflow_name === activeWorkflow.workflow_name
                        );
                        if (updatedW) {
                            activeWorkflow = updatedW;
                            renderNodesList();
                        } else {
                            closeNodesSidebar();
                        }
                    }
                } else {
                    showStatus('프롬프트 로드 실패', true);
                }
            } catch (err) {
                console.error(err);
                showStatus('서버 연결 실패', true);
            }
        }

        // Group prompts by workflow_id (or workflow_name fallback)
        function groupWorkflows() {
            const groups = {};
            allPrompts.forEach(p => {
                // Key is workflow_id, fallback to workflow_name
                const key = p.workflow_id || p.workflow_name || 'unknown';
                if (!groups[key]) {
                    groups[key] = {
                        workflow_id: p.workflow_id || '',
                        workflow_name: p.workflow_name || '',
                        workflow_view_name: p.workflow_view_name || '',
                        nodeCount: 0,
                        prompts: []
                    };
                }
                
                // Keep the workflow_view_name from first non-empty value
                if (p.workflow_view_name && !groups[key].workflow_view_name) {
                    groups[key].workflow_view_name = p.workflow_view_name;
                }
                // Fallback workflow_name if not already populated
                if (p.workflow_name && !groups[key].workflow_name) {
                    groups[key].workflow_name = p.workflow_name;
                }

                groups[key].nodeCount++;
                groups[key].prompts.push(p);
            });

            uniqueWorkflows = Object.values(groups);
        }

        function renderWorkflowsList() {
            const listEl = document.getElementById('workflowsList');
            listEl.innerHTML = '';

            if (uniqueWorkflows.length === 0) {
                listEl.innerHTML = '<li style="padding: 20px; color: #8892b0; text-align: center; font-size: 14px;">검색된 워크플로우가 없습니다.</li>';
                return;
            }

            uniqueWorkflows.forEach(w => {
                const isActive = activeWorkflow && 
                    ((w.workflow_id && w.workflow_id === activeWorkflow.workflow_id) || 
                     (!w.workflow_id && w.workflow_name === activeWorkflow.workflow_name));
                
                const li = document.createElement('li');
                li.className = `prompt-item ${isActive ? 'active' : ''}`;
                li.onclick = () => selectWorkflow(w);

                const viewName = w.workflow_view_name || w.workflow_name || '이름 없는 워크플로우';
                const subTitle = w.workflow_name || w.workflow_id || 'ID 없음';

                li.innerHTML = `
                    <div class="prompt-item-name" title="${viewName}">${viewName}</div>
                    <div class="prompt-item-meta">
                        <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px;" title="${subTitle}">${subTitle}</span>
                        <span style="font-family: 'Rajdhani'; flex-shrink: 0;">${w.nodeCount}개 노드</span>
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        function filterWorkflows() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                groupWorkflows();
                renderWorkflowsList();
                return;
            }
            
            // Search globally on allPrompts first, then group filtered results
            const filteredPrompts = allPrompts.filter(p => {
                const nameMatch = p.workflow_name && p.workflow_name.toLowerCase().includes(query);
                const viewNameMatch = p.workflow_view_name && p.workflow_view_name.toLowerCase().includes(query);
                const nodeMatch = p.node_name && p.node_name.toLowerCase().includes(query);
                const idMatch = p.workflow_id && p.workflow_id.toLowerCase().includes(query);
                return nameMatch || viewNameMatch || nodeMatch || idMatch;
            });

            // Regroup
            const groups = {};
            filteredPrompts.forEach(p => {
                const key = p.workflow_id || p.workflow_name || 'unknown';
                if (!groups[key]) {
                    groups[key] = {
                        workflow_id: p.workflow_id || '',
                        workflow_name: p.workflow_name || '',
                        workflow_view_name: p.workflow_view_name || '',
                        nodeCount: 0,
                        prompts: []
                    };
                }
                if (p.workflow_view_name && !groups[key].workflow_view_name) {
                    groups[key].workflow_view_name = p.workflow_view_name;
                }
                groups[key].nodeCount++;
                groups[key].prompts.push(p);
            });

            uniqueWorkflows = Object.values(groups);
            renderWorkflowsList();
        }

        function selectWorkflow(w) {
            activeWorkflow = w;
            
            // Highlight in workflows list sidebar
            document.querySelectorAll('#workflowsSidebar .prompt-item').forEach(el => el.classList.remove('active'));
            renderWorkflowsList();

            // Open second sidebar
            document.getElementById('nodesSidebar').classList.remove('collapsed');
            document.getElementById('selectedWorkflowViewTitle').textContent = w.workflow_view_name || w.workflow_name;

            // Load nodes
            renderNodesList();

            // If we are currently viewing a prompt that does not belong to this workflow, show empty state
            if (selectedPrompt && 
                ((selectedPrompt.workflow_id && selectedPrompt.workflow_id !== w.workflow_id) ||
                 (!selectedPrompt.workflow_id && selectedPrompt.workflow_name !== w.workflow_name))) {
                document.getElementById('editorWorkspace').style.display = 'none';
                document.getElementById('emptyState').style.display = 'flex';
                selectedPrompt = null;
            }
        }

        function closeNodesSidebar() {
            activeWorkflow = null;
            document.getElementById('nodesSidebar').classList.add('collapsed');
            document.querySelectorAll('#workflowsSidebar .prompt-item').forEach(el => el.classList.remove('active'));
        }

        function renderNodesList() {
            const listEl = document.getElementById('nodesList');
            listEl.innerHTML = '';

            if (!activeWorkflow) return;

            // Filter prompts for active workflow
            const workflowNodes = allPrompts.filter(p => {
                if (activeWorkflow.workflow_id) {
                    return p.workflow_id === activeWorkflow.workflow_id;
                } else {
                    return p.workflow_name === activeWorkflow.workflow_name;
                }
            });

            workflowNodes.forEach(n => {
                const isActive = selectedPrompt && selectedPrompt.id === n.id;
                const li = document.createElement('li');
                li.className = `prompt-item ${isActive ? 'active' : ''}`;
                li.style.padding = '14px 20px';
                li.onclick = () => selectNode(n.id);

                const nodeDispName = n.node_name || '일반 노드';
                const changesPreview = n.changes || '변경 사항 없음';

                li.innerHTML = `
                    <div class="prompt-item-name" style="font-size: 15px;" title="${nodeDispName}">${nodeDispName}</div>
                    <div class="prompt-item-meta">
                        <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;" title="${changesPreview}">${changesPreview}</span>
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        async function selectNode(id) {
            isCreatingNew = false;
            try {
                const res = await fetch(`/api/system-prompts/${id}`);
                if (res.ok) {
                    const data = await res.json();
                    selectedPrompt = data.prompt;

                    // Update UI
                    document.getElementById('emptyState').style.display = 'none';
                    document.getElementById('editorWorkspace').style.display = 'flex';
                    
                    document.getElementById('promptIdDisplay').textContent = `ID: ${selectedPrompt.id}`;
                    document.getElementById('workflowName').value = selectedPrompt.workflow_name || '';
                    document.getElementById('workflowViewName').value = selectedPrompt.workflow_view_name || '';
                    document.getElementById('workflowId').value = selectedPrompt.workflow_id || '';
                    document.getElementById('nodeName').value = selectedPrompt.node_name || '';
                    document.getElementById('changes').value = selectedPrompt.changes || '';
                    document.getElementById('promptText').value = selectedPrompt.prompt || '';
                    document.getElementById('deleteBtn').style.display = 'block';

                    // Update active item class in node list
                    renderNodesList();
                } else {
                    showStatus('상세 내역 가져오기 실패', true);
                }
            } catch (err) {
                console.error(err);
                showStatus('서버 연결 실패', true);
            }
        }

        // Add a brand new workflow (collapses node sidebar first)
        function startNewWorkflowPrompt() {
            selectedPrompt = null;
            activeWorkflow = null;
            isCreatingNew = true;

            closeNodesSidebar();

            // Show and Clear Editor Workspace
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('editorWorkspace').style.display = 'flex';
            
            document.getElementById('promptIdDisplay').textContent = 'ID: NEW';
            document.getElementById('workflowName').value = '';
            document.getElementById('workflowViewName').value = '';
            document.getElementById('workflowId').value = '';
            document.getElementById('nodeName').value = '';
            document.getElementById('changes').value = '';
            document.getElementById('promptText').value = '';
            document.getElementById('deleteBtn').style.display = 'none';
        }

        // Add a new node under the active workflow (pre-fills workflow details!)
        function startNewNodePrompt() {
            if (!activeWorkflow) {
                showStatus('먼저 워크플로우를 선택하십시오.', true);
                return;
            }

            selectedPrompt = null;
            isCreatingNew = true;

            // Show and Pre-fill Editor Workspace
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('editorWorkspace').style.display = 'flex';
            
            document.getElementById('promptIdDisplay').textContent = 'ID: NEW';
            document.getElementById('workflowName').value = activeWorkflow.workflow_name || '';
            document.getElementById('workflowViewName').value = activeWorkflow.workflow_view_name || '';
            document.getElementById('workflowId').value = activeWorkflow.workflow_id || '';
            
            // Clear prompt and node specific fields
            document.getElementById('nodeName').value = '';
            document.getElementById('changes').value = '';
            document.getElementById('promptText').value = '';
            document.getElementById('deleteBtn').style.display = 'none';

            // Remove node selection highlight
            document.querySelectorAll('#nodesSidebar .prompt-item').forEach(el => el.classList.remove('active'));
        }

        function cancelEditing() {
            document.getElementById('editorWorkspace').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            selectedPrompt = null;
            isCreatingNew = false;
            renderNodesList();
        }

        async function savePrompt() {
            const workflow_name = document.getElementById('workflowName').value.trim();
            const workflow_view_name = document.getElementById('workflowViewName').value.trim();
            const workflow_id = document.getElementById('workflowId').value.trim();
            const node_name = document.getElementById('nodeName').value.trim();
            const changes = document.getElementById('changes').value.trim();
            const prompt = document.getElementById('promptText').value;

            if (!workflow_name) {
                showStatus('워크플로우 실제 이름은 필수 항목입니다.', true);
                return;
            }

            const bodyData = {
                workflow_name,
                workflow_view_name: workflow_view_name || null,
                workflow_id: workflow_id || null,
                node_name: node_name || null,
                changes: changes || null,
                prompt: prompt || null
            };

            try {
                let res;
                if (isCreatingNew) {
                    res = await fetch('/api/system-prompts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(bodyData)
                    });
                } else {
                    res = await fetch(`/api/system-prompts/${selectedPrompt.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(bodyData)
                    });
                }

                const result = await res.json();
                if (res.ok) {
                    showStatus('프롬프트가 성공적으로 저장되었습니다.');
                    selectedPrompt = result.prompt;
                    isCreatingNew = false;
                    
                    // Re-establish active workflow to match updated workflow credentials
                    activeWorkflow = {
                        workflow_id: selectedPrompt.workflow_id || '',
                        workflow_name: selectedPrompt.workflow_name || '',
                        workflow_view_name: selectedPrompt.workflow_view_name || ''
                    };

                    await loadPrompts();
                    
                    // Highlight the saved workflow and node
                    const activeW = uniqueWorkflows.find(w => 
                        w.workflow_id === activeWorkflow.workflow_id && 
                        w.workflow_name === activeWorkflow.workflow_name
                    );
                    if (activeW) {
                        selectWorkflow(activeW);
                    }
                    selectNode(selectedPrompt.id);
                } else {
                    showStatus(result.error || '저장 실패', true);
                }
            } catch (err) {
                console.error(err);
                showStatus('네트워크 에러 발생', true);
            }
        }

        async function deletePrompt() {
            if (!selectedPrompt) return;
            if (!confirm(`노드 [${selectedPrompt.node_name || '일반 노드'}] 의 프롬프트를 정말로 삭제하시겠습니까?`)) {
                return;
            }

            try {
                const res = await fetch(`/api/system-prompts/${selectedPrompt.id}`, {
                    method: 'DELETE'
                });
                const result = await res.json();
                
                if (res.ok) {
                    showStatus('성공적으로 삭제되었습니다.');
                    
                    const deletedId = selectedPrompt.id;
                    cancelEditing();
                    
                    // Reload all prompts from DB
                    await loadPrompts();

                    // If active workflow has no nodes remaining, collapse nodes sidebar
                    if (activeWorkflow) {
                        const remaining = allPrompts.filter(p => 
                            p.workflow_id === activeWorkflow.workflow_id && 
                            p.workflow_name === activeWorkflow.workflow_name
                        );
                        if (remaining.length === 0) {
                            closeNodesSidebar();
                        } else {
                            renderNodesList();
                        }
                    }
                } else {
                    showStatus(result.error || '삭제 실패', true);
                }
            } catch (err) {
                console.error(err);
                showStatus('네트워크 에러 발생', true);
            }
        }

        function copyPrompt() {
            const promptText = document.getElementById('promptText').value;
            if (!promptText) {
                showStatus('복사할 프롬프트가 없습니다.', true);
                return;
            }
            navigator.clipboard.writeText(promptText)
                .then(() => showStatus('클립보드에 복사 완료!'))
                .catch(() => showStatus('복사 실패', true));
        }

        // Initialize
        async function init() {
            await verifyAuth();
            await loadPrompts();
        }
        init();
    </script>
</body>

</html>
