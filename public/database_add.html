<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Management - Ciel Mobility AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-violet: #bd00ff;
            --bg-dark: #050a14;
            --danger: #ff2a6d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(189, 0, 255, 0.05) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 25%);
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }

        .app-container {
            display: flex;
            width: 95vw;
            height: 90vh;
            background: rgba(5, 10, 20, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 243, 255, 0.05);
            overflow: hidden;
            z-index: 10;
        }

        .sidebar {
            width: 250px;
            border-right: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            flex-direction: column;
            background: rgba(0, 243, 255, 0.02);
        }

        .sidebar-header {
            padding: 20px;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .sidebar-header a {
            color: #8892b0;
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
        }

        .table-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        .table-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            transition: all 0.2s;
        }

        .table-item:hover, .table-item.active {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-cyan);
            border-left: 3px solid var(--neon-cyan);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .upload-area {
            flex: 1;
            border: 1px dashed rgba(189, 0, 255, 0.4);
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            background: rgba(189, 0, 255, 0.05);
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: var(--neon-violet);
            background: rgba(189, 0, 255, 0.1);
        }

        .upload-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-info svg {
            width: 24px;
            height: 24px;
            stroke: var(--neon-violet);
            fill: none;
            stroke-width: 1.5;
        }

        .file-name {
            display: none;
            color: var(--neon-cyan);
            font-size: 14px;
        }

        #fileInput {
            display: none;
        }

        .add-btn {
            padding: 10px 20px;
            background: var(--neon-violet);
            border: none;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-btn:hover:not(:disabled) {
            background: #d400ff;
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.5);
        }
        .add-btn:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .table-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            font-size: 20px;
        }

        .data-container {
            flex: 1;
            overflow: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        th {
            background: rgba(0, 243, 255, 0.08);
            color: var(--neon-cyan);
            position: sticky;
            top: 0;
            z-index: 2;
            font-family: 'Orbitron', sans-serif;
            font-weight: 500;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .actions-col {
            position: sticky;
            right: 0;
            background: #09101f;
            border-left: 1px solid rgba(255,255,255,0.05);
            z-index: 1;
        }
        th.actions-col {
            z-index: 3;
            background: #0f1c30;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.1);
        }

        .btn.danger:hover {
            background: rgba(255, 42, 109, 0.1);
        }

        input.edit-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-cyan);
            color: white;
            padding: 6px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8892b0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
        }

        #statusMessage {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            display: none;
            z-index: 100;
            background: rgba(0,0,0,0.8);
        }
        .status-success { color: #00f3ff; border: 1px solid #00f3ff; }
        .status-error { color: #ff2a6d; border: 1px solid #ff2a6d; }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div>Tables</div>
                <a href="admin.html">← Back</a>
            </div>
            <ul class="table-list" id="tableList">
                <!-- Populated via JS -->
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header-actions">
                <label class="upload-area" id="dropZone">
                    <div class="upload-info">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <span>Click to select Excel files for bulk upload</span>
                    </div>
                    <div class="file-name" id="fileNameDisplay"></div>
                    <input type="file" id="fileInput" multiple accept=".xlsx, .xls, .csv">
                </label>
                <button class="add-btn" id="uploadBtn" disabled>UPLOAD EXCEL</button>
            </div>

            <div class="table-header">
                <div class="table-title" id="currentTableTitle">Select a table</div>
                <button class="btn" id="addRowBtn" style="display: none;">+ Add Row</button>
            </div>

            <div class="data-container">
                <div id="tableContainer" class="empty-state">No table selected</div>
            </div>
        </div>
    </div>

    <div id="statusMessage"></div>

    <script>
        // Matrix Background
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const cols = Math.floor(width / 20) + 1;
        const ypos = Array(cols).fill(0);

        function matrix() {
            ctx.fillStyle = 'rgba(5, 10, 20, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#bd00ff';
            ctx.font = '15px monospace';
            ypos.forEach((y, ind) => {
                const text = String.fromCharCode(Math.random() * 128);
                const x = ind * 20;
                ctx.fillText(text, x, y);
                if (y > 100 + Math.random() * 10000) ypos[ind] = 0;
                else ypos[ind] = y + 20;
            });
        }
        setInterval(matrix, 50);
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });

        // App Logic
        let currentTable = null;
        let tableColumns = [];
        let tableData = [];

        function showStatus(msg, isError = false) {
            const el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = isError ? 'status-error' : 'status-success';
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        async function fetchTables() {
            try {
                const res = await fetch('/api/db/tables');
                const data = await res.json();
                const list = document.getElementById('tableList');
                list.innerHTML = '';
                data.tables.forEach(table => {
                    const li = document.createElement('li');
                    li.className = 'table-item';
                    li.textContent = table;
                    li.onclick = () => loadTable(table, li);
                    list.appendChild(li);
                });
            } catch (err) {
                showStatus('Error fetching tables', true);
            }
        }

        async function loadTable(tableName, listItem) {
            // Update active state
            document.querySelectorAll('.table-item').forEach(el => el.classList.remove('active'));
            if(listItem) listItem.classList.add('active');
            
            currentTable = tableName;
            document.getElementById('currentTableTitle').textContent = tableName;
            document.getElementById('addRowBtn').style.display = 'block';
            document.getElementById('tableContainer').innerHTML = '<div class="empty-state">Loading...</div>';

            try {
                const res = await fetch(`/api/db/tables/${tableName}`);
                const data = await res.json();
                tableColumns = data.columns;
                tableData = data.data;
                renderTable();
            } catch (err) {
                showStatus('Error loading table data', true);
            }
        }

        function renderTable() {
            if (!tableColumns.length) {
                document.getElementById('tableContainer').innerHTML = '<div class="empty-state">Table has no columns</div>';
                return;
            }

            let html = '<table><thead><tr>';
            tableColumns.forEach(col => {
                html += `<th>${col.column_name}</th>`;
            });
            html += '<th class="actions-col">Actions</th></tr></thead><tbody id="tableBody">';
            
            tableData.forEach(row => {
                html += createRowHtml(row);
            });
            
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }

        function createRowHtml(row, isEdit = false) {
            let html = `<tr data-id="${row.id || ''}">`;
            tableColumns.forEach(col => {
                const val = row[col.column_name] !== null && row[col.column_name] !== undefined ? row[col.column_name] : '';
                if (isEdit && col.column_name !== 'id') { // Don't edit ID
                    html += `<td><input type="text" class="edit-input" data-col="${col.column_name}" value="${val.toString().replace(/"/g, '&quot;')}"></td>`;
                } else {
                    html += `<td>${val}</td>`;
                }
            });

            html += '<td class="actions-col">';
            if (isEdit) {
                html += `<button class="btn" onclick="saveRow(this, '${row.id || ''}')">Save</button>`;
                html += `<button class="btn danger" onclick="cancelEdit(this)">Cancel</button>`;
            } else {
                html += `<button class="btn" onclick="editRow(this)">Edit</button>`;
                html += `<button class="btn danger" onclick="deleteRow('${row.id}')">Del</button>`;
            }
            html += '</td></tr>';
            return html;
        }

        document.getElementById('addRowBtn').onclick = () => {
            const tbody = document.getElementById('tableBody');
            const newRow = {};
            tableColumns.forEach(col => newRow[col.column_name] = '');
            const trHtml = createRowHtml(newRow, true);
            tbody.insertAdjacentHTML('afterbegin', trHtml);
            // Mark as new row by not passing ID to saveRow
            tbody.firstElementChild.querySelector('.btn').setAttribute('onclick', "saveRow(this, 'NEW')");
        };

        window.editRow = (btn) => {
            const tr = btn.closest('tr');
            const id = tr.getAttribute('data-id');
            const row = tableData.find(r => r.id == id);
            if (row) {
                tr.outerHTML = createRowHtml(row, true);
            }
        };

        window.cancelEdit = (btn) => {
            const tr = btn.closest('tr');
            const id = tr.getAttribute('data-id');
            if (!id || id === 'NEW') {
                tr.remove(); // It was a new row
            } else {
                const row = tableData.find(r => r.id == id);
                tr.outerHTML = createRowHtml(row);
            }
        };

        window.saveRow = async (btn, id) => {
            const tr = btn.closest('tr');
            const inputs = tr.querySelectorAll('.edit-input');
            const rowData = {};
            
            inputs.forEach(input => {
                rowData[input.getAttribute('data-col')] = input.value;
            });

            try {
                let res;
                if (id === 'NEW') {
                    res = await fetch(`/api/db/tables/${currentTable}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(rowData)
                    });
                } else {
                    res = await fetch(`/api/db/tables/${currentTable}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(rowData)
                    });
                }

                const result = await res.json();
                if (res.ok) {
                    showStatus('Saved successfully');
                    if (id === 'NEW') {
                        tableData.unshift(result.row);
                    } else {
                        const idx = tableData.findIndex(r => r.id == id);
                        tableData[idx] = result.row;
                    }
                    tr.outerHTML = createRowHtml(result.row);
                } else {
                    showStatus(result.error || 'Failed to save', true);
                }
            } catch (err) {
                showStatus('Network error', true);
            }
        };

        window.deleteRow = async (id) => {
            if(!id) return showStatus('Cannot delete row without ID', true);
            if (!confirm('Are you sure you want to delete this row?')) return;

            try {
                const res = await fetch(`/api/db/tables/${currentTable}/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showStatus('Deleted successfully');
                    tableData = tableData.filter(r => r.id != id);
                    renderTable();
                } else {
                    const result = await res.json();
                    showStatus(result.error || 'Failed to delete', true);
                }
            } catch (err) {
                showStatus('Network error', true);
            }
        };

        // File Upload Logic
        let sessionId = sessionStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
            sessionStorage.setItem('sessionId', sessionId);
        }

        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                if (fileInput.files.length === 1) {
                    fileNameDisplay.textContent = fileInput.files[0].name;
                } else {
                    fileNameDisplay.textContent = `${fileInput.files.length} files selected`;
                }
                fileNameDisplay.style.display = 'block';
                uploadBtn.disabled = false;
            } else {
                fileNameDisplay.style.display = 'none';
                uploadBtn.disabled = true;
            }
        });

        uploadBtn.addEventListener('click', async () => {
            if (!fileInput.files.length) return;
            
            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append(`file${i}`, fileInput.files[i]);
            }
            
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'UPLOADING...';

            try {
                const response = await fetch(`http://localhost:5678/webhook/xlsx-multi-to-pg?sessionId=${sessionId}`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    showStatus('Successfully added to database!');
                    fileInput.value = '';
                    fileNameDisplay.style.display = 'none';
                    setTimeout(() => { uploadBtn.disabled = true; uploadBtn.textContent = 'UPLOAD EXCEL'; }, 2000);
                } else {
                    throw new Error(`Server returned ${response.status}`);
                }
            } catch (err) {
                showStatus(`Error: ${err.message}`, true);
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'UPLOAD EXCEL';
            }
        });

        // Initialize
        fetchTables();
    </script>
</body>
</html>
